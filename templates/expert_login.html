{% extends "base.html" %}
{% block title %}Expert Login{% endblock %}

{% block content %}
<section class="welcome-section">
  <h1>Expert Login</h1>
  <p>Access consultation requests assigned to you.</p>
</section>

<form method="post" action="{{ url_for('expert_login_post') }}" class="card auth-card">
  <input type="hidden" name="next" value="{{ next }}">

  <div class="field">
    <label>Email or Username</label>
    <input type="text" name="login" required placeholder="e.g. ama.mensah@example.com">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" name="password" required>
  </div>

  {% if error %}
    <p class="error-text">{{ error }}</p>
  {% endif %}

  <div class="card-footer-right">
    <button class="primary-btn" type="submit">Sign in</button>
  </div>
</form>
{% endblock %}
